name: SmartResto Backend CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Задаємо робочу директорію за замовчуванням для всіх кроків (steps)
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: smartresto_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    # Крок копіювання коду працює в корені репозиторію (це ок, копіює весь smart-resto)
    - name: Checkout project code
      uses: actions/checkout@v3

    # Налаштування Node.js також глобальне
    - name: Set up Node.js environment
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./backend/package-lock.json # Вказуємо де лежить lock-файл

    # Всі наступні кроки автоматично виконуватимуться всередині папки ./backend
    - name: Install dependencies
      run: npm install

    - name: Run Code Linter Check
      run: npm run lint

    - name: Generate Prisma ORM Client
      run: npx prisma generate
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/smartresto_test

    - name: Execute Automated Tests
      run: npm run test
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/smartresto_test
        JWT_SECRET: super_secret_test_key
